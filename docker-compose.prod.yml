services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: .
    expose:
      - "3000"
    volumes:
      - app_data:/app/data
      - app_uploads:/app/public/uploads
    env_file:
      - .env.prod
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  app_data:
  app_uploads:
